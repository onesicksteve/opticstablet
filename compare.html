<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compare</title>
  <link rel="stylesheet" href="css/screen2.css" />
</head>
<body class="comparePage">
  <header class="wrap browseHeader">
    <div class="topBar">
      <a class="btn secondary" href="browse.html" aria-label="Back to browse">← Back</a>
      <h1 class="browseTitle">Compare</h1>
      <button id="clearCompareTop" class="btn secondary" type="button">Clear</button>
    </div>
  </header>

  <main class="wrap compareMain">
    <div id="status" class="muted"></div>

    <section id="compareHeader" class="compareHeader" hidden></section>

    <section id="compareTableWrap" hidden>
      <div class="tableScroll">
        <table class="compareTable" aria-label="Compare specs">
          <thead>
            <tr>
              <th class="specCol">Spec</th>
              <th id="colA">Item A</th>
              <th id="colB">Item B</th>
            </tr>
          </thead>
          <tbody id="compareBody"></tbody>
        </table>
      </div>
      <p class="muted small compareNote">
        Tip: Populate each product’s <code>specs</code> in <code>data/products.json</code>. Keys should match your printed spec tables exactly.
      </p>
    </section>
  </main>

  <script src="js/compare.js"></script>
</body>
</html>
