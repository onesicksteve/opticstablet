<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="container">
    <div class="topbar">
      <a class="btn ghost" href="index.html">← Home</a>

      <a class="btn ghost" href="compare.html">
        Compare <span id="compareCount">0</span>
      </a>
    </div>

    <h1 id="pageTitle">Browse</h1>

    <div class="toolbar">
      <label class="toggle">
        <input type="checkbox" id="rewardsToggle" />
        <span>Show rewards value</span>
      </label>

      <input
        id="searchInput"
        placeholder="Search by brand or model"
        autocomplete="off"
      />

      <div class="muted">
        <span id="itemCount">0</span> item(s)
      </div>
    </div>

    <div id="grid"></div>
  </div>

  <script src="js/browse.js"></script>
</body>
</html>

  <script src="js/browse.js"></script>
