<!doctype html>

    <section class="tileGrid">

          </div>
          <div class="tileIcon"></div>
        </div>
      </a>

      <a class="tile tile-binos" href="browse.html?cat=binoculars">

          </div>
          <div class="tileIcon"></div>
        </div>
      </a>

      <a class="tile tile-scopes" href="browse.html?cat=spotting-scopes">
        <div class="tileInner">
          <div class="tileText">
            <h2>Spotting Scopes</h2>

          </div>

        </div>
